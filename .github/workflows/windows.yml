name: Ruby on Windows

on:
  push:
    branches:
      - master
  pull_request: {}
  merge_group: {}

permissions:
  contents: read

jobs:
  compile:
    runs-on: "windows-latest"
    strategy:
      fail-fast: false
      matrix:
        ruby: ['3.4', ucrt, mswin]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: load ruby
        uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1.314.0
        with:
          ruby-version: ${{ matrix.ruby }}

      # ucrt and mswin have the dev version Ruby.
      # It introduce checksum mismatches for bundled gems. So remove them before `bundle install`
      - name: Purge gem caches
        run: |
          ruby -e '
            exit if "${{ matrix.ruby }}" != "ucrt" && "${{ matrix.ruby }}" != "mswin"

            require "open-uri"
            require "json"

            res = URI.parse("https://stdgems.org/bundled_gems.json").read
            bundled_gems = JSON.parse(res)["gems"].map{_1["gem"]}
            system "gem uninstall #{bundled_gems.join(" ")} --force", exception: true
          '
      - name: Ignore Gemfile.lock's BUNDLED WITH on dev Ruby
        if: ${{ matrix.ruby == 'ucrt' || matrix.ruby == 'mswin' }}
        run: bundle config set --local version system
      - name: bundle install
        run: |
          bundle config set without profilers libs
          bundle install
      - name: compile
        run: bundle exec rake compile
